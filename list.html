<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Коллекция — audiox</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="list">
    <header class="top">
      <div class="container top__inner">
        <div class="brand" aria-label="Логотип сайта">
          <div class="brand__mark" aria-hidden="true"></div>
          <div class="brand__text">
            <div class="brand__title">audio<span class="brand__accent">x</span></div>
            <div class="brand__subtitle">музыка и коллекция</div>
          </div>
        </div>
        <nav class="bars" aria-label="Навигация">
          <a class="bar" href="./index.html">Главная</a>
          <a class="bar" href="./form.html">Новый альбом</a>
          <a class="bar is-active" href="./list.html">Список</a>
          <a class="bar" href="./register.html">Регистрация</a>
        </nav>
      </div>
    </header>

    <main id="content" class="container">
      <section class="section">
        <h1 class="panel__title">Коллекция</h1>

        <div class="stats" id="stats">
          <div class="stat"><span class="stat__label">Всего</span><span class="stat__value" id="stat-total">0</span></div>
          <div class="stat"><span class="stat__label">Прослушано</span><span class="stat__value" id="stat-completed">0</span></div>
          <div class="stat"><span class="stat__label">Слушаю</span><span class="stat__value" id="stat-listening">0</span></div>
          <div class="stat"><span class="stat__label">Средняя оценка</span><span class="stat__value" id="stat-rating">0.0</span></div>
        </div>

        <div class="filters">
          <select class="field__input" id="filter-status">
            <option value="all">Все статусы</option>
            <option value="planned">В планах</option>
            <option value="listening">Слушаю</option>
            <option value="completed">Прослушан</option>
          </select>
          <input class="field__input" id="filter-search" type="search" placeholder="Поиск по альбому или артисту" />
        </div>

        <div class="table-wrap">
          <table class="music-table">
            <thead>
              <tr>
                <th>Альбом</th>
                <th>Жанр</th>
                <th>Год</th>
                <th>Статус</th>
                <th>Рейтинг</th>
              </tr>
            </thead>
            <tbody id="albums-table-body"></tbody>
          </table>
        </div>
        <p class="panel__text" id="list-empty" hidden>Записей пока нет.</p>
      </section>
    </main>

    <div class="modal" id="album-modal" hidden>
      <div class="modal__backdrop" data-modal-close tabindex="-1"></div>
      <div
        class="modal__panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-album-title"
      >
        <button type="button" class="modal__close" aria-label="Закрыть">×</button>
        <div class="detail modal__detail">
          <div class="detail__cover cover" data-album="" id="modal-detail-cover">
            <img id="modal-detail-cover-img" src="" alt="" />
          </div>
          <div class="detail__body">
            <h2 class="panel__title" id="modal-album-title"></h2>
            <p class="panel__text" id="modal-album-meta"></p>
            <div class="chips" id="modal-album-chips">
              <span class="badge" id="modal-album-genre"></span>
              <span class="badge" id="modal-album-year"></span>
              <span class="badge" id="modal-album-status"></span>
              <span class="badge" id="modal-album-rating"></span>
            </div>
            <p class="tile__text" id="modal-album-review"></p>
          </div>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div class="container footer__inner">
        <div class="muted">© audiox</div>
      </div>
    </footer>
    <script src="./main.js" defer></script>
  </body>
</html>

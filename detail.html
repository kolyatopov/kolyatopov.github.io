<!doctype html>
<html lang="ru" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Детали — audiox</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./styles.css" />
    <!-- Favicon: используем тот же логотип, что в шапке (logo.png). -->
    <link rel="icon" href="./logo.png" type="image/png" />
  </head>
  <body class="d-flex flex-column min-vh-100" data-page="detail">
    <header class="audiox-top">
      <nav class="navbar navbar-expand-md navbar-dark audiox-navbar sticky-top">
        <div class="container">
          <a class="navbar-brand d-flex align-items-center gap-2" href="./index.html" aria-label="audiox — на главную">
            <span class="brand__mark flex-shrink-0" aria-hidden="true"></span>
            <span class="brand__text text-start">
              <span class="brand__title d-block lh-sm">audio<span class="brand__accent">x</span></span>
              <span class="brand__subtitle small text-white-50">музыка и коллекция</span>
            </span>
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#audioxNav"
            aria-controls="audioxNav"
            aria-expanded="false"
            aria-label="Открыть меню"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="audioxNav">
            <ul class="navbar-nav ms-auto mb-2 mb-md-0 gap-md-1">
              <li class="nav-item">
                <a class="nav-link" href="./index.html">Главная</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./form.html">Новый альбом</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./list.html">Коллекция</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./register.html">Регистрация</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main id="content" class="container flex-grow-1 py-4">
      <div class="card border-secondary bg-dark shadow-lg">
        <div class="card-body p-4">
          <div class="row g-4 align-items-start">
            <div class="col-md-4">
              <div class="detail__cover cover" data-album="" id="detail-cover">
                <img
                  src=""
                  alt="Обложка альбома"
                  loading="lazy"
                  referrerpolicy="no-referrer"
                  id="detail-cover-img"
                />
              </div>
            </div>
            <div class="col-md-8">
              <h1 class="panel__title h3" id="detail-title">Нет записи</h1>
              <p class="panel__text" id="detail-meta"></p>

              <div class="chips" id="detail-chips">
                <span class="audiox-badge" id="detail-genre">—</span>
                <span class="audiox-badge" id="detail-year">—</span>
                <span class="audiox-badge" id="detail-status">—</span>
                <span class="audiox-badge" id="detail-rating">—</span>
              </div>

              <p class="tile__text" id="detail-review"></p>
              <a class="btn btn-primary" href="./list.html">К коллекции</a>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container footer__inner">
        <div class="muted">© audiox</div>
      </div>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="./main.js" defer></script>
  </body>
</html>
